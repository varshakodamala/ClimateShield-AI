version: '3.8'

services:
  weather-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - DB_PASSWORD=${DB_PASSWORD}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    volumes:
      - ../logs:/app/logs
      - ../data:/app/data
    depends_on:
      - postgres
      - redis
    networks:
      - weather-network
    restart: unless-stopped

  weather-dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
    command: ["streamlit", "run", "services/dashboard/streamlit_app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    depends_on:
      - weather-api
    networks:
      - weather-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=weather_db
      - POSTGRES_USER=weather_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - weather-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - weather-network
    restart: unless-stopped

  airflow-webserver:
    image: apache/airflow:2.7.3
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://weather_user:${DB_PASSWORD}@postgres:5432/weather_db
      - AIRFLOW__CORE__FERNET_KEY=your_fernet_key_here
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    ports:
      - "8080:8080"
    volumes:
      - ../orchestration/airflow/dags:/opt/airflow/dags
      - ../orchestration/airflow/plugins:/opt/airflow/plugins
      - ../logs:/opt/airflow/logs
    depends_on:
      - postgres
    networks:
      - weather-network
    command: webserver
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.7.3
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://weather_user:${DB_PASSWORD}@postgres:5432/weather_db
      - AIRFLOW__CORE__FERNET_KEY=your_fernet_key_here
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ../orchestration/airflow/dags:/opt/airflow/dags
      - ../orchestration/airflow/plugins:/opt/airflow/plugins
      - ../logs:/opt/airflow/logs
    depends_on:
      - postgres
    networks:
      - weather-network
    command: scheduler
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  weather-network:
    driver: bridge
